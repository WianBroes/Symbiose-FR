name: Vérification sécurité

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: Analyse scripts shell (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Analyser tous les scripts
        run: |
          echo "Scripts analysés :"
          find . -name "*.sh" | sort
          echo ""
          find . -name "*.sh" -exec shellcheck --severity=warning {} +

  semgrep:
    name: Analyse sécurité avancée (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Semgrep
        run: pip install semgrep

      - name: Analyser les scripts (patterns dangereux)
        run: semgrep --config p/bash --config p/secrets . --error

  detect-secrets:
    name: Détection de secrets et clés API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer detect-secrets
        run: pip install detect-secrets

      - name: Scanner le repo
        run: |
          detect-secrets scan --all-files > .secrets.baseline
          detect-secrets audit .secrets.baseline --report --fail-on-unaudited || true
          python3 -c "
          import json
          with open('.secrets.baseline') as f:
              data = json.load(f)
          results = data.get('results', {})
          if results:
              print('⚠️  Secrets potentiels détectés :')
              for file, secrets in results.items():
                  for s in secrets:
                      print(f'  {file} — ligne {s[\"line_number\"]} — type: {s[\"type\"]}')
              exit(1)
          else:
              print('✓ Aucun secret détecté.')
          "
